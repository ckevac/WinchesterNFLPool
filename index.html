<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE ARENA - NFL Pick'em</title>
    
    <link rel="icon" type="image/png" href="nflpoollogo.png">
    <link rel="apple-touch-icon" href="nflpoollogo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="THE ARENA">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes strike { 
            0% { opacity: 0; transform: scaleY(0); filter: brightness(3); } 
            10% { opacity: 1; transform: scaleY(1.4); }
            40% { opacity: 1; transform: scaleY(1); filter: brightness(1); }
            100% { opacity: 0; transform: scaleY(0.8); }
        }
        @keyframes logoGlow {
            0% { filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.4)); }
            50% { filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.7)); }
            100% { filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.4)); }
        }
        body { background-color: #020617; color: white; -webkit-tap-highlight-color: transparent; font-family: ui-sans-serif, system-ui; }
        .app-logo { animation: logoGlow 3s ease-in-out infinite; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4RpMBkLg2n2N_icd1eYXCp1zX882RF3YAzOnzzsxQvtwBR7_tbGpL_Ji87_mzvmHg7Q/exec"; 
        const CURRENT_NFL_WEEK = 3;
        const ESPN_BASE_URL = "https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard?year=2025&seasontype=2";

        const Icon = ({ name, size = 24, className = "", fill = "none" }) => {
            const [svgHtml, setSvgHtml] = useState('');
            useEffect(() => {
                if (window.lucide && window.lucide.icons) {
                    const iconName = name.charAt(0).toUpperCase() + name.slice(1);
                    const icon = window.lucide.icons[iconName] || window.lucide.icons[name];
                    if (icon) {
                        const svg = window.lucide.createElement(icon, {
                            width: size, height: size, class: className, fill: fill, 'stroke-width': 2, stroke: 'currentColor'
                        });
                        setSvgHtml(svg.outerHTML);
                    }
                }
            }, [name, size, className, fill]);
            return <span className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }} dangerouslySetInnerHTML={{ __html: svgHtml }} />;
        };

        const TeamHelmet = ({ logoUrl, teamAbbr, side = "left", isSelected = false, hasPickedOther = false, isDisabled = false, isSurvivor = false }) => {
            const isLeft = side === "left";
            const dimensions = isSurvivor ? "w-20 h-20 sm:w-24 sm:h-24" : "w-28 h-28 sm:w-32 sm:h-32";
            return (
                <div className={`relative ${dimensions} transition-all duration-500 transform ${isSelected ? 'scale-125 drop-shadow-[0_0_25px_rgba(59,130,246,0.5)] z-10' : ''} ${(hasPickedOther || isDisabled) && !isSelected ? 'scale-75 opacity-20 grayscale' : 'opacity-100'}`}>
                    <img src="https://lh3.googleusercontent.com/d/1Vo-ScHvacHq_TZVRpZtxHZeNvYPSfAzW" className={`w-full h-full object-contain ${isLeft ? 'scale-x-[-1]' : ''}`} alt="Helmet" crossOrigin="anonymous" />
                    <div className={`absolute top-[22%] ${isLeft ? 'left-[22%]' : 'right-[22%]'} w-[38%] h-[38%] flex items-center justify-center transform ${isLeft ? 'rotate-[-3deg]' : 'rotate-[3deg]'}`}>
                        <img src={logoUrl} className="w-full h-full object-contain drop-shadow-md" alt={teamAbbr} onError={(e) => { e.target.src = "https://a.espncdn.com/i/teamlogos/nfl/500/nfl.png"; }} />
                    </div>
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(() => JSON.parse(localStorage.getItem('nfl_user')) || null);
            const [view, setView] = useState(user ? 'landing' : 'login'); 
            const [standingsTab, setStandingsTab] = useState('weekly');
            const [viewingWeek, setViewingWeek] = useState(CURRENT_NFL_WEEK - 1 || 1); 
            const [players, setPlayers] = useState([]);
            const [loginData, setLoginData] = useState({ name: '', password: '' });
            const [picks, setPicks] = useState({});
            const [survivorPick, setSurvivorPick] = useState(null);
            const [usedTeams, setUsedTeams] = useState([]);
            const [tieBreaker, setTieBreaker] = useState('');
            const [loading, setLoading] = useState(false);
            const [weekGames, setWeekGames] = useState([]);
            const [leaderboardRaw, setLeaderboardRaw] = useState([]);
            const [survivorData, setSurvivorData] = useState([]);
            const [error, setError] = useState(null);

            useEffect(() => { fetchPlayers(); fetchCurrentWeekGames(); }, []);
            useEffect(() => { if (user) fetchUserStatus(); }, [user]);
            useEffect(() => {
                if (view === 'results') {
                    if (standingsTab === 'survivor') fetchSurvivorLeaderboard();
                    else fetchLeaderboard();
                }
            }, [view, standingsTab, viewingWeek]);

            const fetchUserStatus = async () => {
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getUserHistory&name=${encodeURIComponent(user.name)}&week=${CURRENT_NFL_WEEK}`);
                    const data = await res.json();
                    if (data.usedTeams) setUsedTeams(data.usedTeams);
                    if (data.currentPicks) {
                        setPicks(data.currentPicks.gamePicks || {});
                        setSurvivorPick(data.currentPicks.survivorPick || null);
                        setTieBreaker(data.currentPicks.tieBreaker || '');
                    }
                } catch (e) { console.error(e); }
            };

            const fetchPlayers = async () => {
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getPlayers`);
                    const data = await res.json();
                    if (data.players) setPlayers(data.players);
                } catch (e) { console.error(e); }
            };

            const fetchCurrentWeekGames = async () => {
                try {
                    const res = await fetch(`${ESPN_BASE_URL}&week=${CURRENT_NFL_WEEK}`);
                    const data = await res.json();
                    const games = (data?.events || []).map(event => {
                        const comp = event?.competitions?.[0];
                        const home = comp.competitors.find(c => c.homeAway === 'home');
                        const away = comp.competitors.find(c => c.homeAway === 'away');
                        return {
                            id: event.id, status: event.status?.type?.shortDetail || 'TBD',
                            home: { abbr: home.team.abbreviation, name: home.team.shortDisplayName, logo: home.team.logo },
                            away: { abbr: away.team.abbreviation, name: away.team.shortDisplayName, logo: away.team.logo }
                        };
                    });
                    setWeekGames(games);
                } catch (e) { console.error(e); }
            };

            const fetchLeaderboard = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getLeaderboardData`);
                    const data = await response.json();
                    if (data.success) setLeaderboardRaw(data.rows);
                } catch (err) { setError("Load error"); } finally { setLoading(false); }
            };

            const fetchSurvivorLeaderboard = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getSurvivorData`);
                    const data = await response.json();
                    if (data.success) setSurvivorData(data.players);
                } catch (err) { setError("Survivor load error"); } finally { setLoading(false); }
            };

            const processedLeaderboard = useMemo(() => {
                if (!leaderboardRaw.length) return [];
                
                return leaderboardRaw
                    .filter(row => row[0] && row[0].toString().trim() !== "")
                    .map(row => {
                        const weekIdx = 4 + (viewingWeek - 1) * 2;
                        const diffIdx = 5 + (viewingWeek - 1) * 2;
                        
                        return {
                            name: row[0],
                            overall: parseFloat(row[3]) || 0, 
                            weeklyScore: parseFloat(row[weekIdx]) || 0,
                            weeklyDiff: parseFloat(row[diffIdx]) || 0
                        };
                    })
                    .sort((a, b) => {
                        if (standingsTab === 'weekly') {
                            return b.weeklyScore - a.weeklyScore || Math.abs(a.weeklyDiff) - Math.abs(b.weeklyDiff);
                        }
                        return b.overall - a.overall;
                    });
            }, [leaderboardRaw, viewingWeek, standingsTab]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=login&name=${encodeURIComponent(loginData.name)}&pass=${encodeURIComponent(loginData.password)}`);
                    const result = await res.json();
                    if (result.success) {
                        const userData = { name: loginData.name, isAdmin: result.isAdmin };
                        setUser(userData);
                        localStorage.setItem('nfl_user', JSON.stringify(userData));
                        setView('landing');
                    } else setError("Invalid passcode");
                } catch (e) { setError("Login failed"); } finally { setLoading(false); }
            };

            const submitPicks = async () => {
                if (Object.keys(picks).length < weekGames.length || !survivorPick || !tieBreaker) {
                    setError("Incomplete form"); return;
                }
                setLoading(true);
                try {
                    const res = await fetch(GOOGLE_SCRIPT_URL, { 
                        method: 'POST', headers: { 'Content-Type': 'text/plain' }, 
                        body: JSON.stringify({ action: 'submitPicks', user: user.name, week: CURRENT_NFL_WEEK, tieBreaker, picks, survivorPick }) 
                    });
                    const result = await res.json();
                    if (result.success) setView('landing');
                } catch (err) { setError("Failed"); } finally { setLoading(false); }
            };

            if (view === 'login') return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950">
                    <div className="w-full max-w-sm text-center space-y-8">
                        <img src="nflpoollogo.png" className="w-24 h-24 mx-auto app-logo" />
                        <h1 className="text-4xl font-black italic uppercase tracking-tighter">THE <span className="text-blue-500">ARENA</span></h1>
                        <form onSubmit={handleLogin} className="space-y-4 bg-slate-900/50 p-8 rounded-3xl border border-slate-800">
                            <select className="w-full p-4 bg-slate-800 rounded-2xl font-bold appearance-none text-center" value={loginData.name} onChange={e => setLoginData({...loginData, name: e.target.value})} required>
                                <option value="">Identify Yourself...</option>
                                {players.map(p => <option key={p} value={p}>{p}</option>)}
                            </select>
                            <input type="password" placeholder="Passcode" className="w-full p-4 bg-slate-800 rounded-2xl font-bold text-center" onChange={e => setLoginData({...loginData, password: e.target.value})} required />
                            <button className="w-full py-4 bg-blue-600 rounded-2xl font-black uppercase italic">{loading ? <Icon name="Loader2" className="animate-spin" /> : "Authorize"}</button>
                            {error && <p className="text-red-500 text-[10px] font-black uppercase mt-2">{error}</p>}
                        </form>
                    </div>
                </div>
            );

            if (view === 'landing') return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-950">
                    <div className="w-full max-w-xs space-y-8 text-center">
                        <img src="nflpoollogo.png" className="w-32 h-32 mx-auto app-logo" />
                        <div className="space-y-2">
                            <h1 className="text-4xl font-black italic tracking-tighter">NFL <span className="text-blue-500">ARENA</span></h1>
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-500">Member: {user.name}</p>
                        </div>
                        <div className="space-y-4">
                            <button onClick={() => setView('picks')} className="w-full group flex items-center justify-between p-6 bg-blue-600 rounded-3xl font-black italic transition-all active:scale-95">
                                <span className="text-xl">MAKE PICKS</span>
                                <Icon name="ChevronRight" className="group-hover:translate-x-1 transition-transform" />
                            </button>
                            <button onClick={() => setView('results')} className="w-full flex items-center justify-between p-6 bg-slate-900 border border-slate-800 rounded-3xl font-black italic active:scale-95">
                                <span className="text-xl">STANDINGS</span>
                                <Icon name="Trophy" size={20} />
                            </button>
                            <button onClick={() => { localStorage.removeItem('nfl_user'); setView('login'); }} className="text-[10px] font-black uppercase text-slate-700 tracking-[.25em] pt-6">Log Out</button>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-slate-950 pb-12">
                    <header className="sticky top-0 z-50 glass p-4 flex justify-between items-center px-6">
                        <button onClick={() => setView('landing')} className="flex items-center gap-2 font-black italic text-blue-500">
                            <img src="nflpoollogo.png" className="w-8 h-8" />
                            <span className="text-xl tracking-tighter">ARENA</span>
                        </button>
                        <div className="bg-slate-900 p-1 rounded-xl flex gap-1 border border-slate-800">
                            <button onClick={() => setView('picks')} className={`px-4 py-1.5 text-[10px] font-black uppercase rounded-lg ${view === 'picks' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>Entry</button>
                            <button onClick={() => setView('results')} className={`px-4 py-1.5 text-[10px] font-black uppercase rounded-lg ${view === 'results' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>Leader</button>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-4 space-y-6">
                        {view === 'picks' ? (
                            <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="text-center">
                                    <h2 className="text-3xl font-black italic uppercase tracking-tighter">Week {CURRENT_NFL_WEEK} Picks</h2>
                                    <p className="text-[10px] font-black uppercase text-slate-500 tracking-widest">Select your winning slate</p>
                                </div>
                                {weekGames.map(game => (
                                    <div key={game.id} className="bg-slate-900/40 border border-slate-800 rounded-[2.5rem] p-6">
                                        <div className="flex items-center justify-around py-4">
                                            <button onClick={() => setPicks(p => ({...p, [game.id]: game.away.abbr}))} className="flex flex-col items-center gap-2">
                                                <TeamHelmet teamAbbr={game.away.abbr} logoUrl={game.away.logo} isSelected={picks[game.id] === game.away.abbr} hasPickedOther={picks[game.id] && picks[game.id] !== game.away.abbr} side="left" />
                                                <span className="text-[10px] font-black uppercase text-slate-500">{game.away.name}</span>
                                            </button>
                                            <div className="text-xs font-black italic text-slate-800 uppercase">VS</div>
                                            <button onClick={() => setPicks(p => ({...p, [game.id]: game.home.abbr}))} className="flex flex-col items-center gap-2">
                                                <TeamHelmet teamAbbr={game.home.abbr} logoUrl={game.home.logo} isSelected={picks[game.id] === game.home.abbr} hasPickedOther={picks[game.id] && picks[game.id] !== game.home.abbr} side="right" />
                                                <span className="text-[10px] font-black uppercase text-slate-500">{game.home.name}</span>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                <div className="bg-slate-900 border border-slate-800 p-8 rounded-[3rem] space-y-8">
                                    <div className="text-center">
                                        <h3 className="text-3xl font-black italic text-red-500 uppercase tracking-tighter">Survivor Pick</h3>
                                        <p className="text-[10px] text-slate-600 font-bold uppercase tracking-widest">Selected: {survivorPick || "None"}</p>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        {weekGames.flatMap(g => [g.away, g.home]).map(t => (
                                            <button key={t.abbr} onClick={() => setSurvivorPick(t.abbr)} disabled={usedTeams.includes(t.abbr)} className={`p-4 rounded-[2rem] border-2 transition-all flex flex-col items-center gap-2 ${survivorPick === t.abbr ? 'bg-red-500/10 border-red-500' : 'bg-slate-950 border-slate-800'} ${usedTeams.includes(t.abbr) ? 'opacity-20 grayscale' : ''}`}>
                                                <img src={t.logo} className="w-10 h-10 object-contain" />
                                                <span className="text-[10px] font-black uppercase">{t.abbr}</span>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="space-y-4 pt-6">
                                        <p className="text-[10px] text-center font-black uppercase text-slate-500 tracking-[.2em]">Combined MNF Score</p>
                                        <input type="number" value={tieBreaker} onChange={e => setTieBreaker(e.target.value)} className="w-full bg-slate-950 border border-slate-800 p-6 rounded-3xl text-4xl font-black text-center focus:border-blue-500 outline-none" placeholder="--" />
                                        <button onClick={submitPicks} disabled={loading} className="w-full py-6 bg-blue-600 rounded-3xl font-black italic uppercase text-xl shadow-2xl active:scale-95">
                                            {loading ? <Icon name="Loader2" className="animate-spin" /> : "LOCK IT IN"}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="flex flex-col gap-4">
                                    <div className="bg-slate-900 p-1 rounded-2xl flex border border-slate-800">
                                        {['weekly', 'overall', 'survivor'].map(s => (
                                            <button key={s} onClick={() => setStandingsTab(s)} className={`flex-1 py-3 text-[10px] font-black uppercase rounded-xl transition-all ${standingsTab === s ? (s === 'survivor' ? 'bg-red-600 shadow-lg' : 'bg-blue-600 shadow-lg') : 'text-slate-500'}`}>{s}</button>
                                        ))}
                                    </div>
                                    
                                    {standingsTab !== 'survivor' && (
                                        <div className="relative">
                                            <select 
                                                value={viewingWeek} 
                                                onChange={e => setViewingWeek(parseInt(e.target.value))}
                                                className="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl font-black uppercase text-[10px] tracking-widest text-center focus:border-blue-500 outline-none transition-all shadow-inner"
                                            >
                                                {Array.from({length: 18}, (_, i) => i + 1).map(w => (
                                                    <option key={w} value={w} className="bg-slate-900">WEEK {w} DATA</option>
                                                ))}
                                            </select>
                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none opacity-50">
                                                <Icon name="ChevronDown" size={16} />
                                            </div>
                                        </div>
                                    )}
                                </div>

                                {loading ? (
                                    <div className="py-20 text-center flex flex-col items-center gap-4 text-slate-700 font-black italic uppercase"><Icon name="Zap" className="animate-pulse text-blue-500" /> Calculating Rank...</div>
                                ) : (
                                    <div className="space-y-3">
                                        {standingsTab === 'survivor' ? (
                                            survivorData.map((p, idx) => (
                                                <div key={idx} className={`flex items-center justify-between p-5 rounded-3xl glass ${p.status === 'OUT' ? 'opacity-30' : 'border-red-500/40 shadow-[0_0_15px_rgba(239,68,68,0.1)]'}`}>
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-8 h-8 rounded-full flex items-center justify-center font-black text-xs ${p.status === 'OUT' ? 'bg-slate-800' : 'bg-red-600 text-white'}`}>{idx + 1}</div>
                                                        <div><p className="font-black italic uppercase text-sm">{p.name}</p><p className="text-[9px] text-slate-500 font-bold uppercase tracking-widest">{p.status === 'OUT' ? `Knocked Out Week ${p.week}` : 'STILL ALIVE'}</p></div>
                                                    </div>
                                                    <div className="flex -space-x-2">
                                                        {p.picks?.map((pick, i) => <img key={i} src={`https://a.espncdn.com/i/teamlogos/nfl/500/${pick.toLowerCase()}.png`} className="w-8 h-8 object-contain drop-shadow-lg" />)}
                                                    </div>
                                                </div>
                                            ))
                                        ) : (
                                            processedLeaderboard.map((p, idx) => (
                                                <div key={idx} className={`flex items-center justify-between p-5 rounded-[2rem] glass transition-all ${p.name === user.name ? 'border-blue-500 bg-blue-500/5' : ''}`}>
                                                    <div className="flex items-center gap-4">
                                                        <div className={`w-10 h-10 rounded-2xl flex items-center justify-center font-black italic text-lg ${idx === 0 ? 'bg-yellow-500 text-slate-950' : idx === 1 ? 'bg-slate-300 text-slate-950' : idx === 2 ? 'bg-orange-700' : 'bg-slate-800 text-slate-500'}`}>{idx + 1}</div>
                                                        <div>
                                                            <p className="font-black italic uppercase">{p.name}</p>
                                                            <p className="text-[9px] text-slate-500 font-black uppercase tracking-widest">
                                                                {standingsTab === 'weekly' ? `MNF Tie: ${p.weeklyDiff}` : `Wk ${viewingWeek} Stats`}
                                                            </p>
                                                        </div>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className={`text-3xl font-black italic leading-none ${idx === 0 ? 'text-blue-500' : 'text-slate-100'}`}>
                                                            {(standingsTab === 'weekly' ? p.weeklyScore : p.overall).toLocaleString(undefined, { maximumFractionDigits: 1 })}%
                                                        </p>
                                                        <p className="text-[8px] font-black uppercase text-slate-600 tracking-widest">Accuracy Percentage</p>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
