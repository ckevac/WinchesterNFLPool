<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arena - NFL Pick'em</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            margin: 0;
            overflow-x: hidden;
        }

        @keyframes strike { 
            0% { opacity: 0; transform: scaleY(0); filter: brightness(5) blur(2px); } 
            10% { opacity: 1; transform: scaleY(1.2); } 
            20% { opacity: 0; } 
            30% { opacity: 1; } 
            100% { opacity: 0; transform: scaleY(1) translateY(100%); filter: brightness(1) blur(0); } 
        }
        @keyframes chargeRight { 
            0% { transform: translateX(0) scale(1.1); } 
            35% { transform: translateX(80px) scale(1.4) rotate(20deg); } 
            100% { transform: translateX(0) scale(1.1); } 
        }
        @keyframes chargeLeft { 
            0% { transform: translateX(0) scale(1.1); } 
            35% { transform: translateX(-80px) scale(1.4) rotate(-20deg); } 
            100% { transform: translateX(0) scale(1.1); } 
        }
        @keyframes crush { 
            0% { transform: scale(1); opacity: 0.8; } 
            15% { transform: scale(1.2) rotate(-5deg); filter: brightness(2); } 
            40% { transform: scale(0.1) rotate(45deg) translateY(50px); opacity: 0; filter: blur(10px); } 
            100% { transform: scale(0.1); opacity: 0; } 
        }
        
        .animate-strike { animation: strike 0.3s ease-out 0.1s forwards; }
        .animate-charge-right { animation: chargeRight 0.4s ease-in-out; }
        .animate-charge-left { animation: chargeLeft 0.4s ease-in-out; }
        .animate-crush { animation: crush 0.45s ease-in forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- CONFIGURATION ---
        const CURRENT_WEEK = 2; 
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz6KfjjkQRc4MMj4joZFi2OTzMjbtbMA0ckwrPPI4YP2iPrbg-r0Edx51n1M8Mm4ipJkw/exec"; 
        const ESPN_BASE_URL = "https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard?year=2025&seasontype=2";
        const HELMET_BASE_URL = "https://lh3.googleusercontent.com/d/1Vo-ScHvacHq_TZVRpZtxHZeNvYPSfAzW";

        // --- ICONS ---
        const Trophy = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55-.47.98-.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
        );
        const ShieldCheck = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"></path><path d="m9 12 2 2 4-4"></path></svg>
        );
        const RefreshCw = ({ size = 20, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M3 21v-5h5"></path></svg>
        );

        // --- COMPONENTS ---
        const TeamHelmet = ({ logoUrl, teamAbbr, side = "left", isSelected = false, isAnimating = false, hasPickedOther = false }) => {
            const isLeft = side === "left";
            const animationClass = isAnimating ? (isSelected ? (isLeft ? "animate-charge-right" : "animate-charge-left") : "animate-crush") : "";

            return (
                <div className={`relative w-28 h-28 sm:w-32 sm:h-32 transition-all duration-300 transform ${isSelected ? 'scale-110 drop-shadow-[0_0_25px_rgba(59,130,246,0.7)] z-10' : 'opacity-40 grayscale-[20%]'} ${hasPickedOther && !isSelected && !isAnimating ? 'scale-75 opacity-10' : ''} ${animationClass}`}>
                    {isAnimating && isSelected && (
                        <div className="absolute inset-0 pointer-events-none overflow-hidden z-20 flex justify-center">
                            <svg className="w-16 h-full animate-strike" viewBox="0 0 100 100" preserveAspectRatio="none">
                                <path d="M50 0 L30 40 L70 35 L40 100 L55 55 L20 65 Z" fill="white" filter="drop-shadow(0 0 8px rgba(255,255,255,1))" />
                            </svg>
                        </div>
                    )}
                    <img src={HELMET_BASE_URL} className={`w-full h-full object-contain ${isLeft ? 'scale-x-[-1]' : ''}`} alt="Helmet" />
                    <div className={`absolute top-[22%] ${isLeft ? 'left-[22%]' : 'right-[22%]'} w-[38%] h-[38%] flex items-center justify-center transform ${isLeft ? 'rotate-[-3deg]' : 'rotate-[3deg]'}`}>
                        <img src={logoUrl} className="w-full h-full object-contain" alt={teamAbbr} />
                    </div>
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('landing'); 
            const [leaderboardSubView, setLeaderboardSubView] = useState('weekly'); 
            const [selectedWeek, setSelectedWeek] = useState(CURRENT_WEEK); 
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('nfl_user')) || null);
            const [players, setPlayers] = useState([]);
            const [loginData, setLoginData] = useState({ name: '', password: '' });
            const [picks, setPicks] = useState({});
            const [weekGames, setWeekGames] = useState([]);
            const [leaderboard, setLeaderboard] = useState([]);
            const [loading, setLoading] = useState(false);
            const [animatingPick, setAnimatingPick] = useState(null);

            // Logic to ensure "Weekly" results always start on the current week
            useEffect(() => {
                if (view === 'results' && leaderboardSubView === 'weekly') {
                    setSelectedWeek(CURRENT_WEEK);
                }
            }, [view, leaderboardSubView]);

            const fetchPlayers = async () => {
                try {
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getPlayers`);
                    const data = await res.json();
                    if (data.players) setPlayers(data.players);
                } catch (e) { console.error(e); }
            };

            const fetchWeekData = async () => {
                try {
                    const res = await fetch(`${ESPN_BASE_URL}&week=${CURRENT_WEEK}`);
                    const data = await res.json();
                    const games = (data?.events || []).map(event => ({
                        id: event.id,
                        status: event.status?.type?.shortDetail,
                        home: { abbr: event.competitions[0].competitors.find(c => c.homeAway === 'home').team.abbreviation, logo: event.competitions[0].competitors.find(c => c.homeAway === 'home').team.logo, name: event.competitions[0].competitors.find(c => c.homeAway === 'home').team.shortDisplayName },
                        away: { abbr: event.competitions[0].competitors.find(c => c.homeAway === 'away').team.abbreviation, logo: event.competitions[0].competitors.find(c => c.homeAway === 'away').team.logo, name: event.competitions[0].competitors.find(c => c.homeAway === 'away').team.shortDisplayName }
                    }));
                    setWeekGames(games);
                } catch (e) { console.error(e); }
            };

            const fetchLeaderboard = async () => {
                setLoading(true);
                try {
                    const weekToFetch = leaderboardSubView === 'weekly' ? selectedWeek : CURRENT_WEEK;
                    const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getLeaderboard&week=${weekToFetch}&type=${leaderboardSubView}`);
                    const data = await res.json();
                    if (data.results) setLeaderboard(data.results);
                } catch (e) { console.error(e); }
                finally { setLoading(false); }
            };

            useEffect(() => { fetchPlayers(); fetchWeekData(); }, []);
            useEffect(() => { if (view === 'results') fetchLeaderboard(); }, [view, leaderboardSubView, selectedWeek]);

            const handleLogin = (e) => {
                e.preventDefault();
                const ud = { name: loginData.name };
                setUser(ud);
                localStorage.setItem('nfl_user', JSON.stringify(ud));
                setView('landing');
            };

            const handlePick = (gameId, teamAbbr) => {
                setAnimatingPick({ gameId, teamAbbr });
                setTimeout(() => {
                    setPicks(prev => ({ ...prev, [gameId]: teamAbbr }));
                    setAnimatingPick(null);
                }, 450);
            };

            if (!user) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                        <div className="w-full max-w-sm space-y-8">
                            <h1 className="text-4xl font-black text-white italic uppercase tracking-tighter">THE <span className="text-blue-500">ARENA</span></h1>
                            <form onSubmit={handleLogin} className="space-y-4">
                                <select className="w-full p-5 bg-slate-900 border border-slate-800 rounded-3xl text-white font-bold outline-none" onChange={(e) => setLoginData({...loginData, name: e.target.value})} required>
                                    <option value="">Select Identity...</option>
                                    {players.map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                                <input type="password" placeholder="Passcode" className="w-full p-5 bg-slate-900 border border-slate-800 rounded-3xl text-white font-bold outline-none" required />
                                <button className="w-full py-5 bg-blue-600 rounded-3xl text-white font-black italic uppercase shadow-xl active:scale-95 transition-all">Authorize Entry</button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-950 text-slate-100">
                    <header className="bg-slate-900/80 backdrop-blur-xl border-b border-slate-800 sticky top-0 z-40 p-4">
                        <div className="max-w-2xl mx-auto flex justify-between items-center">
                            <button onClick={() => setView('landing')} className="font-black italic uppercase text-blue-500">ARENA</button>
                            <div className="flex bg-slate-800/50 p-1 rounded-xl">
                                <button onClick={() => setView('picks')} className={`px-4 py-2 text-[9px] font-black uppercase rounded-lg ${view === 'picks' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>Picks</button>
                                <button onClick={() => setView('results')} className={`px-4 py-2 text-[9px] font-black uppercase rounded-lg ${view === 'results' ? 'bg-blue-600 text-white' : 'text-slate-500'}`}>Leaderboard</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-4 py-8">
                        {view === 'landing' && (
                            <div className="text-center space-y-8 pt-12">
                                <div className="p-6 bg-blue-600/10 rounded-full inline-block text-blue-500"><Trophy size={64}/></div>
                                <h2 className="text-5xl font-black italic uppercase">Week {CURRENT_WEEK}</h2>
                                <div className="space-y-4 max-w-xs mx-auto">
                                    <button onClick={() => setView('picks')} className="w-full p-6 bg-blue-600 rounded-3xl font-black uppercase italic shadow-lg">Enter Arena</button>
                                    <button onClick={() => setView('results')} className="w-full p-6 bg-slate-900 border border-slate-800 rounded-3xl font-black uppercase italic">View Standings</button>
                                </div>
                            </div>
                        )}

                        {view === 'picks' && (
                            <div className="space-y-6">
                                {weekGames.map(game => (
                                    <div key={game.id} className="bg-slate-900 rounded-[2.5rem] border border-slate-800 overflow-hidden">
                                        <div className="p-2 bg-slate-800/30 text-[9px] font-bold text-center uppercase text-slate-500 border-b border-slate-800">{game.status}</div>
                                        <div className="flex items-center justify-around py-10 px-4">
                                            <button onClick={() => handlePick(game.id, game.away.abbr)} className="flex flex-col items-center gap-3">
                                                <TeamHelmet teamAbbr={game.away.abbr} logoUrl={game.away.logo} side="left" isSelected={picks[game.id] === game.away.abbr} isAnimating={animatingPick?.gameId === game.id} hasPickedOther={picks[game.id] && picks[game.id] !== game.away.abbr} />
                                                <span className="text-[11px] font-black uppercase">{game.away.name}</span>
                                            </button>
                                            <span className="text-2xl font-black italic text-slate-800">VS</span>
                                            <button onClick={() => handlePick(game.id, game.home.abbr)} className="flex flex-col items-center gap-3">
                                                <TeamHelmet teamAbbr={game.home.abbr} logoUrl={game.home.logo} side="right" isSelected={picks[game.id] === game.home.abbr} isAnimating={animatingPick?.gameId === game.id} hasPickedOther={picks[game.id] && picks[game.id] !== game.home.abbr} />
                                                <span className="text-[11px] font-black uppercase">{game.home.name}</span>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'results' && (
                            <div className="space-y-6">
                                <div className="flex justify-between items-end px-2">
                                    <div>
                                        <h3 className="text-2xl font-black italic uppercase text-white">Standings</h3>
                                        <div className="flex gap-2 mt-4">
                                            {['weekly', 'overall', 'survivor'].map(type => (
                                                <button key={type} onClick={() => setLeaderboardSubView(type)} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase ${leaderboardSubView === type ? 'bg-blue-600' : 'bg-slate-900 text-slate-500'}`}>{type}</button>
                                            ))}
                                        </div>
                                    </div>
                                    {leaderboardSubView === 'weekly' && (
                                        <select value={selectedWeek} onChange={(e) => setSelectedWeek(Number(e.target.value))} className="bg-slate-900 border border-slate-800 p-2 rounded-xl text-[10px] font-black uppercase text-white outline-none">
                                            {Array.from({ length: CURRENT_WEEK }, (_, i) => i + 1).map(w => (
                                                <option key={w} value={w}>Week {w}</option>
                                            ))}
                                        </select>
                                    )}
                                </div>
                                
                                <div className="space-y-3">
                                    {loading ? (
                                        <div className="text-center py-20 text-slate-500 font-black uppercase text-xs italic">Syncing Stats...</div>
                                    ) : (
                                        leaderboard.map((p, idx) => (
                                            <div key={p.player} className="bg-slate-900 p-5 rounded-3xl border border-slate-800 flex justify-between items-center">
                                                <div className="flex items-center gap-5">
                                                    <div className="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center font-black text-sm text-slate-500">{idx + 1}</div>
                                                    <div>
                                                        <span className="block font-black uppercase text-white">{p.player}</span>
                                                        <span className="text-[9px] font-bold text-slate-500 uppercase">{p.correct || 0} Correct</span>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="text-xl font-black text-blue-500">{p.total > 0 ? ((p.correct / p.total) * 100).toFixed(0) : 0}%</div>
                                                    <div className="text-[8px] font-black text-slate-600 uppercase">Accuracy</div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
