<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Pick'em 2025</title>
    <!-- React & Babel for Browser Rendering -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        // Mocking Lucide icons since we're in a browser script
        const Icon = ({ name, size = 24, ...props }) => {
            const [iconSvg, setIconSvg] = useState('');
            useEffect(() => {
                if (window.lucide) {
                    const svg = lucide.createIcons();
                }
            }, []);
            // Use fallback text-based icons or SVGs for common icons
            return <i data-lucide={name} style={{width: size, height: size}} {...props}></i>;
        };

        // Standard Lucide replacement for browser-side
        const Trophy = (props) => <Icon name="trophy" {...props} />;
        const CheckCircle2 = (props) => <Icon name="check-circle-2" {...props} />;
        const Loader2 = (props) => <Icon name="loader-2" className="animate-spin" {...props} />;
        const RefreshCw = (props) => <Icon name="refresh-cw" {...props} />;
        const AlertCircle = (props) => <Icon name="alert-circle" {...props} />;
        const LayoutGrid = (props) => <Icon name="layout-grid" {...props} />;
        const ListOrdered = (props) => <Icon name="list-ordered" {...props} />;
        const ChevronRight = (props) => <Icon name="chevron-right" {...props} />;
        const Play = (props) => <Icon name="play" {...props} />;
        const BarChart3 = (props) => <Icon name="bar-chart-3" {...props} />;
        const Info = (props) => <Icon name="info" {...props} />;
        const Calendar = (props) => <Icon name="calendar" {...props} />;
        const Lock = (props) => <Icon name="lock" {...props} />;
        const User = (props) => <Icon name="user" {...props} />;
        const LogOut = (props) => <Icon name="log-out" {...props} />;
        const Save = (props) => <Icon name="save" {...props} />;
        const Medal = (props) => <Icon name="medal" {...props} />;

        // --- CONFIGURATION ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzMbqnnabqAHLkA8EbOPpxxuYyiP_g0zP0loA-YE7e8tG8OJP10bwqqBcTELq9yWxCmFA/exec"; 
        const WEEK_1_API_URL = "https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard?year=2025&seasontype=2&week=1";

        const TEAMS = {
          ARI: { name: "Cardinals", color: "#97233F", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ari.png" },
          ATL: { name: "Falcons", color: "#A71930", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/atl.png" },
          BAL: { name: "Ravens", color: "#241773", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/bal.png" },
          BUF: { name: "Bills", color: "#00338D", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/buf.png" },
          CAR: { name: "Panthers", color: "#0085CA", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/car.png" },
          CHI: { name: "Bears", color: "#0B162A", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/chi.png" },
          CIN: { name: "Bengals", color: "#FB4F14", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/cin.png" },
          CLE: { name: "Browns", color: "#311D00", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/cle.png" },
          DAL: { name: "Cowboys", color: "#002a5c", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/dal.png" },
          DEN: { name: "Broncos", color: "#FB4F14", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/den.png" },
          DET: { name: "Lions", color: "#0076B6", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/det.png" },
          GB: { name: "Packers", color: "#203731", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/gb.png" },
          HOU: { name: "Texans", color: "#03202F", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/hou.png" },
          IND: { name: "Colts", color: "#002C5F", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ind.png" },
          JAX: { name: "Jaguars", color: "#006778", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/jax.png" },
          KC: { name: "Chiefs", color: "#E31837", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/kc.png" },
          LV: { name: "Raiders", color: "#000000", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/lv.png" },
          LAC: { name: "Chargers", color: "#0080C6", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/lac.png" },
          LAR: { name: "Rams", color: "#003594", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/lar.png" },
          MIA: { name: "Dolphins", color: "#008E97", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/mia.png" },
          MIN: { name: "Vikings", color: "#4F2683", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/min.png" },
          NE: { name: "Patriots", color: "#002244", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ne.png" },
          NO: { name: "Saints", color: "#D3BC8D", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/no.png" },
          NYG: { name: "Giants", color: "#0B2265", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/nyg.png" },
          NYJ: { name: "Jets", color: "#125740", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/nyj.png" },
          PHI: { name: "Eagles", color: "#004C54", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/phi.png" },
          PIT: { name: "Steelers", color: "#FFB612", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/pit.png" },
          SF: { name: "49ers", color: "#AA0000", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/sf.png" },
          SEA: { name: "Seahawks", color: "#002244", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/sea.png" },
          TB: { name: "Buccaneers", color: "#D50A0A", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/tb.png" },
          TEN: { name: "Titans", color: "#0C2340", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/ten.png" },
          WAS: { name: "Commanders", color: "#5A1414", logo: "https://a.espncdn.com/i/teamlogos/nfl/500/was.png" }
        };

        const TeamLogo = ({ logoUrl, teamAbbr, size = "large", isWinner = false }) => {
          const [imgError, setImgError] = useState(false);
          const containerClasses = size === "large" ? "w-16 h-16" : "w-8 h-8";
          const activeLogo = logoUrl || TEAMS[teamAbbr]?.logo;

          return (
            <div className={`${containerClasses} rounded-full flex items-center justify-center shadow-inner border-2 ${isWinner ? 'border-amber-400' : 'border-slate-700'} overflow-hidden bg-white p-1.5 transition-all`}>
              {!imgError && activeLogo ? (
                <img src={activeLogo} alt={teamAbbr} className={size === "large" ? "w-12 h-12 object-contain" : "w-6 h-6 object-contain"} onError={() => setImgError(true)} />
              ) : (
                <div className="w-full h-full flex items-center justify-center text-white font-black text-[10px]" style={{ backgroundColor: TEAMS[teamAbbr]?.color || '#333' }}>
                  {teamAbbr}
                </div>
              )}
            </div>
          );
        };

        function App() {
          const [view, setView] = useState('landing'); 
          const [user, setUser] = useState(JSON.parse(localStorage.getItem('nfl_user')) || null);
          const [players, setPlayers] = useState([]);
          const [playersLoading, setPlayersLoading] = useState(false);
          const [loginData, setLoginData] = useState({ name: '', password: '' });
          const [picks, setPicks] = useState({});
          const [tieBreaker, setTieBreaker] = useState('');
          const [loading, setLoading] = useState(false);
          const [submitted, setSubmitted] = useState(false);
          const [error, setError] = useState(null);
          const [weekGames, setWeekGames] = useState([]);
          const [initialLoadDone, setInitialLoadDone] = useState(false);
          const [leaderboard, setLeaderboard] = useState([]);
          const [actualMnfTotal, setActualMnfTotal] = useState(0);

          useEffect(() => {
             if (window.lucide) window.lucide.createIcons();
          }, [view, weekGames, leaderboard]);

          const fetchPlayers = async () => {
            setPlayersLoading(true);
            try {
              const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getPlayers`);
              const data = await response.json();
              if (data.players) setPlayers(data.players);
            } catch (err) { console.error(err); }
            finally { setPlayersLoading(false); }
          };

          const fetchLeaderboard = async () => {
            setLoading(true);
            try {
              const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getLeaderboard&week=1`);
              const data = await response.json();
              if (data.success) {
                setActualMnfTotal(data.mnfTotal || 0);
                const processed = data.results.map(p => {
                    const accuracy = p.total > 0 ? (p.correct / p.total) * 100 : 0;
                    const mnfDistance = Math.abs(p.tieBreaker - (data.mnfTotal || 0));
                    return { ...p, accuracy: accuracy.toFixed(1), mnfDistance };
                });
                processed.sort((a, b) => parseFloat(b.accuracy) - parseFloat(a.accuracy) || a.mnfDistance - b.mnfDistance);
                setLeaderboard(processed);
              }
            } catch (err) { console.error(err); }
            finally { setLoading(false); }
          };

          const fetchWeekData = async () => {
            setLoading(true);
            try {
              const res = await fetch(WEEK_1_API_URL);
              const data = await res.json();
              const games = (data?.events || []).map(event => {
                const comp = event?.competitions?.[0];
                const home = comp.competitors.find(c => c.homeAway === 'home');
                const away = comp.competitors.find(c => c.homeAway === 'away');
                const hs = parseInt(home.score) || 0;
                const as = parseInt(away.score) || 0;
                return {
                  id: event.id,
                  status: event.status?.type?.shortDetail || 'TBD',
                  isFinal: event.status?.type?.state === 'post',
                  home: { abbr: home.team.abbreviation, name: home.team.shortDisplayName, logo: home.team.logo, score: hs, isWinner: hs > as },
                  away: { abbr: away.team.abbreviation, name: away.team.shortDisplayName, logo: away.team.logo, score: as, isWinner: as > hs }
                };
              });
              setWeekGames(games);
              setInitialLoadDone(true);
            } catch (err) { setError("API Error"); setInitialLoadDone(true); }
            finally { setLoading(false); }
          };

          useEffect(() => {
            fetchWeekData();
            fetchPlayers();
            if (view === 'results') fetchLeaderboard();
          }, [view]);

          const handleLogin = async (e) => {
            e.preventDefault();
            setLoading(true);
            try {
              const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=login&name=${encodeURIComponent(loginData.name)}&pass=${encodeURIComponent(loginData.password)}`);
              const result = await response.json();
              if (result.success) {
                const ud = { name: loginData.name, isAdmin: result.isAdmin };
                setUser(ud);
                localStorage.setItem('nfl_user', JSON.stringify(ud));
              } else { setError("Invalid Pass"); }
            } catch (err) { setError("Login Failed"); }
            finally { setLoading(false); }
          };

          const submitPicks = async () => {
            setLoading(true);
            try {
              await fetch(GOOGLE_SCRIPT_URL, { 
                method: 'POST', 
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify({ action: 'submitPicks', user: user.name, week: 1, tieBreaker, picks }) 
              });
              setSubmitted(true);
            } catch (err) { setError("Submit Failed"); }
            finally { setLoading(false); }
          };

          if (view === 'landing') {
            return (
              <div className="min-h-screen bg-slate-950 flex flex-col items-center justify-center p-6 text-center">
                <div className="space-y-12 w-full max-w-sm">
                  <div className="space-y-4">
                    <div className="inline-flex p-4 bg-blue-600/10 rounded-3xl border border-blue-500/20 text-blue-500 mb-2"><Trophy size={48} /></div>
                    <h1 className="text-4xl font-black text-white italic uppercase tracking-tighter">NFL <span className="text-blue-500 block">Pick'em</span></h1>
                  </div>
                  <div className="space-y-4">
                    <button onClick={() => setView('picks')} className="w-full flex items-center justify-between p-6 bg-blue-600 rounded-3xl text-white font-black italic uppercase">Make Picks <ChevronRight /></button>
                    <button onClick={() => setView('results')} className="w-full flex items-center justify-between p-6 bg-slate-900 border border-slate-800 rounded-3xl text-slate-200 font-black italic uppercase">Leaderboard <ChevronRight /></button>
                  </div>
                </div>
              </div>
            );
          }

          if (!user) {
            return (
                <div className="min-h-screen bg-slate-950 flex items-center justify-center p-4 text-white">
                    <form onSubmit={handleLogin} className="bg-slate-900 p-8 rounded-3xl border border-slate-800 w-full max-w-md space-y-4">
                        <h2 className="text-2xl font-black italic uppercase text-center">Login</h2>
                        <select className="w-full p-4 bg-slate-800 rounded-xl outline-none" onChange={e => setLoginData({...loginData, name: e.target.value})} required>
                            <option value="">Select Name</option>
                            {players.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                        <input type="password" placeholder="Password" className="w-full p-4 bg-slate-800 rounded-xl outline-none" onChange={e => setLoginData({...loginData, password: e.target.value})} required />
                        <button className="w-full bg-blue-600 py-4 rounded-xl font-black uppercase italic">{loading ? '...' : 'Unlock'}</button>
                    </form>
                </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-950 pb-44 text-slate-100">
                <header className="bg-slate-900/80 backdrop-blur-xl border-b border-slate-800 sticky top-0 z-20 p-4">
                    <div className="max-w-2xl mx-auto flex justify-between items-center">
                        <button onClick={() => setView('landing')} className="font-black italic uppercase text-blue-500">NFL 2025</button>
                        <div className="flex bg-slate-800 p-1 rounded-xl">
                            <button onClick={() => setView('picks')} className={`px-4 py-2 text-xs font-black uppercase rounded-lg ${view === 'picks' ? 'bg-blue-600' : ''}`}>Picks</button>
                            <button onClick={() => setView('results')} className={`px-4 py-2 text-xs font-black uppercase rounded-lg ${view === 'results' ? 'bg-blue-600' : ''}`}>Board</button>
                        </div>
                    </div>
                </header>
                <main className="max-w-2xl mx-auto p-4 space-y-4">
                    {view === 'picks' ? (
                        weekGames.map(game => (
                            <div key={game.id} className="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden">
                                <div className="p-2 bg-slate-800 text-[10px] font-bold text-center uppercase tracking-widest text-slate-500">{game.status}</div>
                                <div className="grid grid-cols-2 divide-x divide-slate-800">
                                    {[game.away, game.home].map(team => (
                                        <button key={team.abbr} onClick={() => setPicks({...picks, [game.id]: team.abbr})} className={`p-6 flex flex-col items-center gap-2 ${picks[game.id] === team.abbr ? 'bg-blue-600/20 ring-2 ring-blue-500' : ''}`}>
                                            <TeamLogo logoUrl={team.logo} teamAbbr={team.abbr} size="small" />
                                            <span className="font-black uppercase text-xs">{team.name}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ))
                    ) : (
                        <div className="space-y-4">
                             {leaderboard.map((p, idx) => (
                                <div key={p.player} className="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <span className="text-slate-500 font-black">#{idx + 1}</span>
                                        <span className="font-black uppercase">{p.player}</span>
                                    </div>
                                    <div className="text-right">
                                        <div className="text-blue-500 font-black">{p.accuracy}%</div>
                                        <div className="text-[10px] text-slate-500 uppercase font-bold">Diff: {p.mnfDistance}</div>
                                    </div>
                                </div>
                             ))}
                        </div>
                    )}
                </main>
                {view === 'picks' && (
                    <div className="fixed bottom-0 left-0 right-0 p-6 bg-slate-950/80 backdrop-blur-xl border-t border-slate-800">
                        <button onClick={submitPicks} className="w-full max-w-2xl mx-auto block bg-blue-600 py-5 rounded-2xl font-black italic uppercase shadow-xl shadow-blue-500/20">
                            {submitted ? 'Picks Saved!' : 'Save Week 1 Picks'}
                        </button>
                    </div>
                )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
