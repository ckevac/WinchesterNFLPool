<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Pick'em 2025</title>
    <!-- React and Babel for browser-side execution -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; margin: 0; }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        select { appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURATION ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylZBrN0JESnmFMxSrN7s7liwYX9L_nfnqdhHj4PA0AlQ7_GbNRDc6CGQIO9cTF3-DJog/exec"; 
        const CURRENT_WEEK = 2; 
        const ESPN_BASE_URL = "https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard?year=2025&seasontype=2";

        // --- SVG ICONS (Replaces Lucide-React for pure HTML compatibility) ---
        const Trophy = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );
        const Play = ({ size = 20, fill = "none" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        );
        const BarChart3 = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20V14"/></svg>
        );
        const LogOut = ({ size = 18 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        );
        const Loader2 = ({ className = "" }) => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={`animate-spin ${className}`}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        );

        const TeamLogo = ({ logoUrl, teamAbbr, size = "large", isWinner = false }) => {
            const containerClasses = size === "large" ? "w-16 h-16" : "w-8 h-8";
            return (
                <div className={`${containerClasses} rounded-full flex items-center justify-center border-2 ${isWinner ? 'border-amber-400 scale-110 shadow-[0_0_15px_rgba(251,191,36,0.3)]' : 'border-slate-700'} overflow-hidden bg-white p-1.5 transition-all`}>
                    <img src={logoUrl} alt={teamAbbr} className={size === "large" ? "w-12 h-12 object-contain" : "w-6 h-6 object-contain"} />
                </div>
            );
        };

        function App() {
            const [view, setView] = useState('landing'); 
            const [leaderboardSubView, setLeaderboardSubView] = useState('weekly');
            const [selectedLeaderboardWeek, setSelectedLeaderboardWeek] = useState(CURRENT_WEEK);
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('nfl_user')) || null);
            const [players, setPlayers] = useState([]);
            const [loginData, setLoginData] = useState({ name: '', password: '' });
            const [picks, setPicks] = useState({});
            const [tieBreaker, setTieBreaker] = useState('');
            const [loading, setLoading] = useState(false);
            const [submitted, setSubmitted] = useState(false);
            const [error, setError] = useState(null);
            const [weekGames, setWeekGames] = useState([]);
            const [leaderboardData, setLeaderboardData] = useState([]);

            useEffect(() => {
                fetchPlayers();
                fetchCurrentWeekGames();
            }, []);

            useEffect(() => {
                if (view === 'results') fetchLeaderboard();
            }, [view, leaderboardSubView, selectedLeaderboardWeek]);

            const fetchPlayers = async () => {
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getPlayers`);
                    const data = await response.json();
                    if (data.players) setPlayers(data.players);
                } catch (err) { console.error(err); }
            };

            const fetchCurrentWeekGames = async () => {
                try {
                    const res = await fetch(`${ESPN_BASE_URL}&week=${CURRENT_WEEK}`);
                    const data = await res.json();
                    const games = (data?.events || []).map(event => {
                        const comp = event?.competitions?.[0];
                        const home = comp.competitors.find(c => c.homeAway === 'home');
                        const away = comp.competitors.find(c => c.homeAway === 'away');
                        return {
                            id: event.id,
                            status: event.status?.type?.shortDetail || 'TBD',
                            home: { abbr: home.team.abbreviation, name: home.team.shortDisplayName, logo: home.team.logo },
                            away: { abbr: away.team.abbreviation, name: away.team.shortDisplayName, logo: away.team.logo }
                        };
                    });
                    setWeekGames(games);
                } catch (err) { setError("Failed to fetch schedule."); }
            };

            const fetchLeaderboard = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getLeaderboardData`);
                    const data = await response.json();
                    if (data.success && data.rows) {
                        const processed = data.rows.map(row => {
                            const weekIndex = 4 + (selectedLeaderboardWeek - 1) * 2;
                            const diffIndex = 5 + (selectedLeaderboardWeek - 1) * 2;
                            return {
                                name: row[0],
                                overall: parseFloat(row[3]) || 0,
                                weeklyAcc: parseFloat(row[weekIndex]) || 0,
                                weeklyDiff: parseFloat(row[diffIndex]) || 0
                            };
                        });
                        if (leaderboardSubView === 'weekly') {
                            processed.sort((a, b) => b.weeklyAcc - a.weeklyAcc || a.weeklyDiff - b.weeklyDiff);
                        } else {
                            processed.sort((a, b) => b.overall - a.overall);
                        }
                        setLeaderboardData(processed);
                    }
                } catch (err) { setError("Leaderboard sync failed."); }
                setLoading(false);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                try {
                    const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=login&name=${encodeURIComponent(loginData.name)}&pass=${encodeURIComponent(loginData.password)}`);
                    const result = await response.json();
                    if (result.success) {
                        const userData = { name: loginData.name, isAdmin: result.isAdmin };
                        setUser(userData);
                        localStorage.setItem('nfl_user', JSON.stringify(userData));
                        setView('landing');
                    } else { setError("Invalid password."); }
                } catch (err) { setError("Login failed."); }
                setLoading(false);
            };

            const submitPicks = async () => {
                if (Object.keys(picks).length < weekGames.length) {
                    setError(`Pick all ${weekGames.length} games.`);
                    return;
                }
                if (!tieBreaker) { setError("Score required."); return; }
                setLoading(true);
                try {
                    await fetch(GOOGLE_SCRIPT_URL, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'text/plain' }, 
                        body: JSON.stringify({ action: 'submitPicks', user: user.name, week: CURRENT_WEEK, tieBreaker, picks }) 
                    });
                    setSubmitted(true);
                    setError(null);
                } catch (err) { setError("Submission failed."); }
                setLoading(false);
            };

            if (view === 'landing') {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center animate-in">
                        <div className="space-y-12 w-full max-w-sm">
                            <div className="space-y-4">
                                <div className="inline-flex p-4 bg-blue-600/10 rounded-3xl border border-blue-500/20 text-blue-500 shadow-[0_0_50px_-12px_rgba(59,130,246,0.3)]">
                                    <Trophy size={48} />
                                </div>
                                <h1 className="text-4xl font-black text-white italic uppercase tracking-tighter leading-none">NFL <span className="text-blue-500 block">Pick'em</span></h1>
                                <p className="text-slate-400 font-bold text-xs uppercase tracking-[0.2em]">Season 2025</p>
                            </div>
                            <div className="space-y-4">
                                <button onClick={() => setView('picks')} className="group w-full flex items-center justify-between p-6 bg-blue-600 hover:bg-blue-500 rounded-3xl transition-all shadow-xl active:scale-95 text-white">
                                   <div className="text-left">
                                      <span className="block text-[10px] font-black opacity-70 uppercase tracking-widest">Week {CURRENT_WEEK}</span>
                                      <span className="text-lg font-black uppercase italic">Make Picks</span>
                                   </div>
                                   <Play fill="white" size={20} />
                                </button>
                                <button onClick={() => setView('results')} className="group w-full flex items-center justify-between p-6 bg-slate-900 hover:bg-slate-800 border border-slate-800 rounded-3xl transition-all shadow-xl active:scale-95 text-slate-200">
                                   <div className="text-left">
                                      <span className="block text-[10px] font-black text-slate-500 uppercase tracking-widest">Standings</span>
                                      <span className="text-lg font-black uppercase italic">Leaderboard</span>
                                   </div>
                                   <BarChart3 size={20} />
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (!user) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 animate-in">
                        <div className="bg-slate-900 p-8 rounded-3xl border border-slate-800 w-full max-w-md shadow-2xl">
                            <h2 className="text-2xl font-black text-white mb-6 uppercase italic text-center">Player <span className="text-blue-500">Login</span></h2>
                            {error && <div className="mb-4 p-3 bg-red-500/10 text-red-500 text-xs font-bold rounded-xl text-center">{error}</div>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <select className="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 text-white font-bold outline-none" onChange={(e) => setLoginData({...loginData, name: e.target.value})} required>
                                    <option value="">Select your name...</option>
                                    {players.map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                                <input type="password" placeholder="Password" className="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 text-white outline-none" onChange={(e) => setLoginData({...loginData, password: e.target.value})} required />
                                <button disabled={loading} className="w-full bg-blue-600 py-4 rounded-xl text-white font-black uppercase italic shadow-lg active:scale-95 transition-transform">
                                    {loading ? <Loader2 className="mx-auto" /> : "Enter Arena"}
                                </button>
                            </form>
                            <button onClick={() => setView('landing')} className="w-full mt-4 text-xs font-bold text-slate-500 uppercase hover:text-white">Back</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen pb-32 text-slate-100 animate-in">
                    <header className="bg-slate-950/80 backdrop-blur-xl border-b border-slate-900 sticky top-0 z-20 p-4">
                        <div className="max-w-2xl mx-auto flex items-center justify-between">
                            <button onClick={() => setView('landing')} className="font-black italic uppercase text-blue-500 text-xl tracking-tighter">NFL</button>
                            <div className="flex bg-slate-900 p-1 rounded-xl border border-slate-800">
                                <button onClick={() => setView('picks')} className={`px-5 py-2 text-[10px] font-black uppercase rounded-lg transition-all ${view === 'picks' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>Picks</button>
                                <button onClick={() => setView('results')} className={`px-5 py-2 text-[10px] font-black uppercase rounded-lg transition-all ${view === 'results' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'}`}>Board</button>
                            </div>
                            <button onClick={() => { setUser(null); localStorage.removeItem('nfl_user'); setView('landing'); }} className="p-2 text-slate-500 hover:text-red-500"><LogOut size={18} /></button>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto p-4 space-y-4">
                        {view === 'picks' ? (
                            <div className="space-y-4">
                                <h3 className="text-xl font-black italic uppercase text-slate-200">Week {CURRENT_WEEK} Schedule</h3>
                                {weekGames.map(game => (
                                    <div key={game.id} className="bg-slate-900 rounded-3xl border border-slate-800 overflow-hidden shadow-lg">
                                        <div className="bg-slate-800/30 p-2 text-[9px] font-black text-center text-slate-500 uppercase tracking-widest">{game.status}</div>
                                        <div className="grid grid-cols-2 divide-x divide-slate-800">
                                            {[game.away, game.home].map(team => (
                                                <button key={team.abbr} onClick={() => setPicks(prev => ({...prev, [game.id]: team.abbr}))} className={`p-6 flex flex-col items-center gap-2 transition-all ${picks[game.id] === team.abbr ? 'bg-blue-600/10' : 'hover:bg-slate-800/40'}`}>
                                                    <TeamLogo logoUrl={team.logo} teamAbbr={team.abbr} isWinner={picks[game.id] === team.abbr} />
                                                    <span className={`font-black uppercase text-xs ${picks[game.id] === team.abbr ? 'text-blue-500' : 'text-slate-400'}`}>{team.name}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                                <div className="bg-slate-900 p-6 rounded-3xl border border-slate-800 space-y-4 mt-8">
                                    <h4 className="text-[10px] font-black uppercase text-slate-500 tracking-widest text-center">MNF Total Points Prediction</h4>
                                    <input type="number" className="w-full p-5 bg-slate-950 rounded-2xl border border-slate-800 text-white font-black text-3xl text-center outline-none focus:border-blue-500" value={tieBreaker} onChange={e => setTieBreaker(e.target.value)} />
                                    <button onClick={submitPicks} disabled={loading || submitted} className={`w-full py-5 rounded-2xl font-black uppercase italic shadow-xl transition-all ${submitted ? 'bg-emerald-600' : 'bg-blue-600 hover:bg-blue-500'} text-white`}>
                                        {loading ? <Loader2 className="mx-auto" /> : submitted ? "✓ Picks Locked" : `Lock in Week ${CURRENT_WEEK} Picks`}
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <div className="flex bg-slate-900 p-1.5 rounded-2xl border border-slate-800">
                                   <button onClick={() => setLeaderboardSubView('weekly')} className={`flex-1 py-3 text-[11px] font-black uppercase rounded-xl transition-all ${leaderboardSubView === 'weekly' ? 'bg-slate-800 text-white shadow-lg' : 'text-slate-500'}`}>Weekly</button>
                                   <button onClick={() => setLeaderboardSubView('overall')} className={`flex-1 py-3 text-[11px] font-black uppercase rounded-xl transition-all ${leaderboardSubView === 'overall' ? 'bg-slate-800 text-white shadow-lg' : 'text-slate-500'}`}>Overall</button>
                                </div>
                                {leaderboardSubView === 'weekly' && (
                                    <select className="w-full bg-slate-900 border border-slate-800 text-white font-black uppercase text-[10px] rounded-xl p-3 outline-none" value={selectedLeaderboardWeek} onChange={e => setSelectedLeaderboardWeek(parseInt(e.target.value))}>
                                        {[...Array(CURRENT_WEEK)].map((_, i) => <option key={i+1} value={i+1}>Week {i+1} Results</option>)}
                                    </select>
                                )}
                                {loading ? <div className="py-20 text-center text-slate-600 font-black text-[10px] uppercase italic tracking-widest flex flex-col items-center gap-2"><Loader2 />Ranking...</div> : (
                                    <div className="space-y-2">
                                        {leaderboardData.map((player, idx) => (
                                            <div key={player.name} className={`flex items-center justify-between p-5 bg-slate-900 border ${idx === 0 ? 'border-amber-500/30 bg-amber-500/5' : 'border-slate-800'} rounded-3xl animate-in`} style={{animationDelay: `${idx * 50}ms`}}>
                                                <div className="flex items-center gap-4">
                                                    <span className={`w-6 text-center font-black italic text-lg ${idx === 0 ? 'text-amber-500' : 'text-slate-700'}`}>{idx + 1}</span>
                                                    <div>
                                                        <p className="font-black text-white uppercase tracking-tight text-lg leading-tight">{player.name}</p>
                                                        {leaderboardSubView === 'weekly' && <p className="text-[9px] font-bold text-slate-500 uppercase">Tie-Breaker Diff: {player.weeklyDiff}</p>}
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                   <p className={`text-2xl font-black tracking-tighter ${idx === 0 ? 'text-amber-500' : 'text-blue-500'}`}>
                                                     {leaderboardSubView === 'weekly' ? `${(player.weeklyAcc * 100).toFixed(0)}%` : `${(player.overall * 100).toFixed(1)}%`}
                                                   </p>
                                                   <p className="text-[8px] font-black text-slate-600 uppercase tracking-widest">Accuracy</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
